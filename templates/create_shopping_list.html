{% extends "base.html" %}
{% block title %}Create Shopping List - CoupleApp{% endblock %}

{% block content %}
<div class="content-wrapper" style="max-width: 600px; margin: 2rem auto;">
    <h1 class="mb-3">🛒 Create Shopping List</h1>
    <p class="text-muted mb-3">Create a new shopping list and optionally share it with others</p>
    
    <form method="POST">
        <div class="form-group">
            <label for="name">List Name</label>
            <input type="text" id="name" name="name" required maxlength="100" 
                   placeholder="e.g., Weekly Groceries, Party Supplies, Home Improvement">
            <small class="text-muted">Max 100 characters</small>
        </div>
        
        <div class="form-group">
            <label for="share_with">Share With (Optional)</label>
            <select id="share_with" name="share_with" multiple style="height: 120px;">
                {% for user in users %}
                    <option value="{{ user.id }}">{{ user.username }}</option>
                {% endfor %}
            </select>
            <small class="text-muted">Hold Ctrl/Cmd to select multiple users</small>
        </div>
        
        <div class="flex gap-1">
            <button type="submit" class="btn btn-primary">Create List</button>
            <a href="{{ url_for('shopping.shopping_lists') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
