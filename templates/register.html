{% extends "base.html" %}
{% block title %}Register - CoupleApp{% endblock %}

{% block content %}
<div class="content-wrapper" style="max-width: 400px; margin: 4rem auto;">
    <h1 class="text-center mb-3">🎉 Join CoupleApp</h1>
    <p class="text-center text-muted mb-3">Create an account to start managing your couple activities</p>
    
    <form method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus maxlength="20" 
                   placeholder="Choose a unique username">
            <small class="text-muted">Max 20 characters</small>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6"
                   placeholder="At least 6 characters">
        </div>
        
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
    </form>
    
    <div class="text-center mt-3">
        <p class="text-muted">Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--primary);">Log in here</a></p>
    </div>
</div>
{% endblock %}
