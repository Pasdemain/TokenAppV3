{% extends "base.html" %}
{% block title %}Choose Languages - Flashcards{% endblock %}

{% block content %}
<div class="content-wrapper" style="max-width:500px;margin:2rem auto;">
    <h1 class="mb-3">🌐 Choose Your Languages</h1>
    <p class="text-muted mb-3">Select the language you know and the one you're learning.</p>

    <form method="POST">
        <div class="form-group">
            <label>🗣️ I know (source language)</label>
            <select name="source_lang" required>
                <option value="">— Select language —</option>
                {% for lang in languages %}
                <option value="{{ lang.code }}" {% if session.get('fc_source_lang') == lang.code %}selected{% endif %}>
                    {{ lang.flag_emoji or '' }} {{ lang.name }} ({{ lang.code }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>🎯 I'm learning (target language)</label>
            <select name="target_lang" required>
                <option value="">— Select language —</option>
                {% for lang in languages %}
                <option value="{{ lang.code }}" {% if session.get('fc_target_lang') == lang.code %}selected{% endif %}>
                    {{ lang.flag_emoji or '' }} {{ lang.name }} ({{ lang.code }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="flex gap-1">
            <button type="submit" class="btn btn-primary">🚀 Start</button>
            <a href="{{ url_for('flashcards.flashcards_home') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
