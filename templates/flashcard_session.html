{% extends "base.html" %}
{% block title %}Start Session - Flashcards{% endblock %}

{% block content %}
<div class="content-wrapper" style="max-width:600px;margin:2rem auto;">
    <h1 class="mb-3">▶️ Start Flashcard Session</h1>
    <p class="text-muted mb-3">Choose your languages and optionally a category to focus on.</p>

    <form method="POST">
        <div class="form-group">
            <label>🗣️ I know (source language)</label>
            <select name="source_lang" required>
                <option value="">— Select language —</option>
                {% for lang in languages %}
                <option value="{{ lang.code }}" {% if session.get('fc_source_lang') == lang.code %}selected{% endif %}>
                    {{ lang.flag_emoji or '' }} {{ lang.name }} ({{ lang.code }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>🎯 I'm learning (target language)</label>
            <select name="target_lang" required>
                <option value="">— Select language —</option>
                {% for lang in languages %}
                <option value="{{ lang.code }}" {% if session.get('fc_target_lang') == lang.code %}selected{% endif %}>
                    {{ lang.flag_emoji or '' }} {{ lang.name }} ({{ lang.code }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>📂 Category (optional)</label>
            <select name="category_id">
                <option value="">All categories</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}" {% if session.get('fc_category_id') == cat.id %}selected{% endif %}>
                    {{ cat.icon or '📁' }} {{ cat.name }} ({{ cat.card_count }} cards)
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="flex gap-1">
            <button type="submit" class="btn btn-primary">🚀 Start Review</button>
            <a href="{{ url_for('flashcards.flashcards_home') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
