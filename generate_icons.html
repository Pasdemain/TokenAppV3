<!DOCTYPE html>
<html>
<head>
    <title>Generate CoupleApp Icons</title>
</head>
<body>
    <h1>CoupleApp Icon Generator</h1>
    <p>Right-click and save each icon:</p>
    
    <h2>192x192 Icon</h2>
    <canvas id="icon192" width="192" height="192"></canvas>
    
    <h2>512x512 Icon</h2>
    <canvas id="icon512" width="512" height="512"></canvas>
    
    <script>
        function drawIcon(canvasId, size) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            // Gradient background
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // White circle background for emoji
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/3, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw emoji
            ctx.font = `${size/3}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('💑', size/2, size/2);
            
            // Convert to image
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `icon-${size}.png`;
                a.textContent = ` Download ${size}x${size}`;
                canvas.parentNode.insertBefore(a, canvas.nextSibling);
            });
        }
        
        drawIcon('icon192', 192);
        drawIcon('icon512', 512);
    </script>
</body>
</html>
